<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Live - The Word of God Apostolic Deliverance Vineyard Church</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a0a2e;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }

        .header h1 {
            font-size: 1.3rem;
            color: #fff;
        }

        .back-btn {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: #d63454;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            gap: 1rem;
        }

        .stream-section {
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .preview-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 9/16;
            position: relative;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
        }

        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .preview-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: #666;
            background: #0f0f0f;
        }

        .preview-placeholder svg {
            width: 64px;
            height: 64px;
        }

        .preview-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        #switch-camera-btn,
        #start-camera-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        #switch-camera-btn:hover,
        #start-camera-btn:hover {
            background: #d63454;
        }

        .stream-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-group {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #e94560;
        }

        .control-group h3 {
            margin-bottom: 1rem;
            color: #fff;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e94560;
            border-radius: 6px;
            background: #0f0f0f;
            color: #fff;
            font-size: 0.9rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .go-live-btn {
            background: linear-gradient(135deg, #e94560 0%, #d63454 100%);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
            margin-top: 0.5rem;
        }

        .go-live-btn:hover {
            background: linear-gradient(135deg, #d63454 0%, #b82344 100%);
        }

        .go-live-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .sidebar {
            background: transparent;
            border-left: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-section {
            margin-bottom: 0;
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #e94560;
        }

        .sidebar-section h3 {
            margin-bottom: 1rem;
            color: #fff;
            font-size: 1rem;
        }

        .chat-messages {
            background: #0f0f0f;
            border-radius: 8px;
            padding: 1rem;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            margin-bottom: 0.5rem;
        }

        .chat-message {
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
        }

        .chat-user {
            font-weight: 600;
            color: #e94560;
        }

        .chat-input-group {
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e94560;
            border-radius: 6px;
            background: #0f0f0f;
            color: #fff;
        }

        .send-btn {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .send-btn:hover {
            background: #d63454;
        }

        .stream-stats {
            background: #0f0f0f;
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid #333;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #333;
        }

        .stat-item:last-child {
            margin-bottom: 0;
            border-bottom: none;
        }

        .stat-value {
            font-weight: 600;
            color: #e94560;
        }

        @media (max-width: 768px) {
            .main-content {
                max-width: 100%;
            }

            .preview-container {
                aspect-ratio: 9/16;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Go Live</h1>
        <a href="index.html" class="back-btn">← Back</a>
    </header>

    <div class="main-content">
        <main class="stream-section">
            <div class="preview-container">
                <div id="preview-placeholder" class="preview-placeholder">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                    </svg>
                    <p>Live preview will appear here</p>
                    <div class="preview-buttons">
                        <button id="switch-camera-btn" type="button">Use Back Camera</button>
                        <button id="start-camera-btn">Start Live</button>
                    </div>
                </div>
                <video id="preview-video" class="preview-video" autoplay muted></video>
            </div>

            <div class="sidebar-section">
                <h3>Live Chat</h3>
                <div class="chat-messages" id="chat-messages">
                    <div class="chat-message">
                        <span class="chat-user">System:</span> Welcome to live chat! Stream will start when you go live.
                    </div>
                </div>
                <div class="chat-input-group">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Send a message...">
                    <button class="send-btn" id="send-chat-btn">Send</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Stream Stats</h3>
                <div class="stream-stats">
                    <div class="stat-item">
                        <span>Viewers</span>
                        <span class="stat-value" id="viewer-count">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Duration</span>
                        <span class="stat-value" id="stream-duration">00:00:00</span>
                    </div>
                    <div class="stat-item">
                        <span>Status</span>
                        <span class="stat-value" id="stream-status">Offline</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const startCameraBtn = document.getElementById('start-camera-btn');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const previewVideo = document.getElementById('preview-video');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const chatInput = document.getElementById('chat-input');
        const sendChatBtn = document.getElementById('send-chat-btn');
        const chatMessages = document.getElementById('chat-messages');
        const viewerCount = document.getElementById('viewer-count');
        const streamDuration = document.getElementById('stream-duration');
        const streamStatus = document.getElementById('stream-status');

        let stream = null;
        let isLive = false;
        let startTime = null;
        let durationInterval = null;
        let viewerInterval = null;
        let peerConnection = null;
        let viewerCandidatesAdded = new Set();
        let viewerCandidateInterval = null;
        let currentFacingMode = 'user';

        // WebRTC configuration
        const rtcConfiguration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' }
            ]
        };

        function getCameraConstraints() {
            return {
                video: { facingMode: { ideal: currentFacingMode } },
                audio: true
            };
        }

        function stopStream() {
            if (!stream) return;
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }

        async function openCameraPreview() {
            stopStream();
            try {
                stream = await navigator.mediaDevices.getUserMedia(getCameraConstraints());
                previewVideo.srcObject = stream;
                previewVideo.style.display = 'block';
                previewPlaceholder.style.display = 'none';
            } catch (error) {
                console.error('Could not open camera:', error);
                alert('Unable to access camera with the selected mode. Please try a different camera.');
            }
        }

        function updateSwitchButton() {
            switchCameraBtn.textContent = currentFacingMode === 'user' ? 'Use Back Camera' : 'Use Front Camera';
        }

        updateSwitchButton();

        async function pollViewerCandidates(backendOrigin) {
            if (!peerConnection) return;
            try {
                const response = await fetch(`${backendOrigin}/webrtc/viewer-candidates`);
                const candidates = await response.json();

                for (const candidate of candidates) {
                    if (candidate.candidate && !viewerCandidatesAdded.has(candidate.candidate)) {
                        await peerConnection.addIceCandidate(candidate);
                        viewerCandidatesAdded.add(candidate.candidate);
                    }
                }
            } catch (error) {
                console.error('Error polling viewer candidates:', error);
            }
        }

        // Start camera preview and go live immediately
        startCameraBtn.addEventListener('click', async () => {
            if (isLive) {
                return;
            }

            try {
                await openCameraPreview();

                if (!stream) {
                    throw new Error('No camera stream available');
                }

                startCameraBtn.textContent = 'Live';
                startCameraBtn.disabled = true;

                const isGitHubPages = window.location.hostname === 'ayo454.github.io';
                const backendOrigin = isGitHubPages
                    ? 'https://the-word-of-god-deliverance-vinyard.onrender.com' // Replace with your deployed Render URL
                    : 'http://127.0.0.1:5000';
                const response = await fetch(`${backendOrigin}/start-live`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 0) {
                        throw new Error('Cannot connect to server - check if Flask app is running');
                    }
                    throw new Error(`Live API returned ${response.status}`);
                }

                const data = await response.json();

                if (data.live) {
                    isLive = true;
                    startTime = Date.now();
                    streamStatus.textContent = 'Live';
                    streamStatus.style.color = '#e94560';
                    viewerCount.textContent = data.viewers;

                    // Start WebRTC streaming
                    await startWebRTCStream();

                    durationInterval = setInterval(updateDuration, 1000);
                    viewerInterval = setInterval(() => {
                        if (!isLive) {
                            clearInterval(viewerInterval);
                            return;
                        }
                        const current = parseInt(viewerCount.textContent, 10) || 0;
                        viewerCount.textContent = current + Math.floor(Math.random() * 3);
                    }, 5000);

                    addChatMessage('System', 'Stream has started live. Viewers can now join the live page.');
                }
            } catch (error) {
                console.error('Error starting live stream:', error);
                alert('Unable to start live stream: ' + error.message);
                // Reset on error
                stopStream();
                previewVideo.style.display = 'none';
                previewPlaceholder.style.display = 'block';
                startCameraBtn.textContent = 'Start Live';
                startCameraBtn.disabled = false;
                isLive = false;
            }
        });

        switchCameraBtn.addEventListener('click', async () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            updateSwitchButton();

            if (stream && !isLive) {
                await openCameraPreview();
            }
        });

        // WebRTC streaming function
        async function startWebRTCStream() {
            try {
                peerConnection = new RTCPeerConnection(rtcConfiguration);

                // Add camera stream to peer connection
                stream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, stream);
                });

                // Create offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // Send offer to signaling server
                const isGitHubPages = window.location.hostname === 'ayo454.github.io';
                const backendOrigin = isGitHubPages
                    ? 'https://the-word-of-god-deliverance-vinyard.onrender.com' // Replace with your deployed Render URL
                    : 'http://127.0.0.1:5000';
                await fetch(`${backendOrigin}/webrtc/offer`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(offer)
                });

                // Listen for ICE candidates from the viewer
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        fetch(`${backendOrigin}/webrtc/candidate`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(event.candidate)
                        });
                    }
                };

                // Poll viewer ICE candidates and add them to the broadcaster connection
                await pollViewerCandidates(backendOrigin);
                if (viewerCandidateInterval) {
                    clearInterval(viewerCandidateInterval);
                }
                viewerCandidateInterval = setInterval(() => pollViewerCandidates(backendOrigin), 2000);

                console.log('WebRTC streaming started');
            } catch (error) {
                console.error('WebRTC error:', error);
            }
        }

        // Update stream duration
        function updateDuration() {
            if (startTime && isLive) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const hours = Math.floor(elapsed / 3600);
                const minutes = Math.floor((elapsed % 3600) / 60);
                const seconds = elapsed % 60;
                streamDuration.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // Chat functionality
        sendChatBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const message = chatInput.value.trim();
            if (message) {
                addChatMessage('You', message);
                chatInput.value = '';
            }
        }

        function addChatMessage(user, message) {
            const messageEl = document.createElement('div');
            messageEl.className = 'chat-message';
            messageEl.innerHTML = `<span class="chat-user">${user}:</span> ${message}`;
            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (peerConnection) {
                peerConnection.close();
            }
        });
    </script>
</body>
</html>
